version: '{build} {branch}'

image:
  - macOS-sonoma   # 14.2.1
  - macOS-ventura  # 13.6.4

environment:
  MESA_DIST_WIN_VER: 25.1.5
  QT_OPENGL_DLL: opengl32 # https://github.com/qt/qtbase/commit/6c85067ba51fae169b99538b2ba3a5dd30348227#diff-30d85ae3c18697e52d180edc79bb5eefcb74f970957dc73b3a766541088a5237

init:
  - appveyor version
  - cmd: ver
  - cmd: systeminfo | findstr /B /C:"OS Name" /C:"OS Version"
  - sh: type system_profiler && system_profiler SPSoftwareDataType SPHardwareDataType || true
  - sh: type lsb_release && lsb_release -a || true
  - sh: type uname && uname -a || true
  - ps: $env:APPVEYOR_REPO_BRANCH2 = $env:APPVEYOR_REPO_BRANCH -replace '/', '-'
  - sh: export "APPVEYOR_REPO_BRANCH2=${APPVEYOR_REPO_BRANCH/\//-}"

for:
-
  matrix:
    only:
      - image: Ubuntu2204
  environment:
    APPIMAGE_EXTRACT_AND_RUN: 1 # 2204 doesn’t have libfuse2
  services:
    - docker
  install:
    - time docker pull ghcr.io/knossos-project/arch
  build_script:
    - time docker run --privileged --cap-add=ALL -v /lib/modules:/lib/modules -v /dev:/dev -v ${APPVEYOR_BUILD_FOLDER}:/root/knossos -e APPVEYOR_REPO_BRANCH2 ghcr.io/knossos-project/arch bash -c '/root/knossos/ci/build_linux.sh'
  artifacts:
    - path: '*nightly.*'
-
  matrix:
    only:
      - image: Ubuntu2004
      - image: Ubuntu1804
      - image: Ubuntu1604
  build: off
  before_test:
    - curl --fail -JLO https://github.com/knossos-project/knossos/releases/download/nightly-dev/linux.$APPVEYOR_REPO_BRANCH2-KNOSSOS.nightly.AppImage
    - chmod +x linux.$APPVEYOR_REPO_BRANCH2-KNOSSOS.nightly.AppImage
  deploy: off
-
  matrix:
    only:
      - image: macOS-sonoma
  install:
    - brew pin appveyor-build-agent # https://github.com/appveyor/ci/issues/3763#issuecomment-1003168277
    #- time brew update
    - time brew upgrade || true # skipped upgrades for pinned packages don’t return cleanly
    - time brew remove qt6 || true
    - time brew install boost ninja python qt5 snappy
    - time python3 -m pip install requests --break-system-packages
    - time brew install --overwrite cmake # for building from source, brew needs its own cmake, which conflicts with the preinstalled one
    - time brew tap --force homebrew/core
    - sed -e 's/depends_on "qt5compat"//' -e 's/"qtbase"/"qt@5"/' -i bak $(brew edit --print-path quazip)
    # Warning: `brew install` ignores locally edited casks and formulae if HOMEBREW_NO_INSTALL_FROM_API is not set.
    - time env HOMEBREW_NO_INSTALL_FROM_API=1 brew install -s quazip # build from source (with patched qt5 dependency)
    - sed -e 's/"qtbase"/"qt@5"/' -e 's/-DBUILD_WITH_QT6=ON/-DBUILD_WITH_QT6=OFF -DBUILD_WITH_QT5=ON -DCMAKE_PREFIX_PATH=\/usr\/local\/opt\/qt@5\//' -i bak "$(brew edit --print-path qtkeychain)"
    # Warning: `brew install` ignores locally edited casks and formulae if HOMEBREW_NO_INSTALL_FROM_API is not set.
    - time env HOMEBREW_NO_INSTALL_FROM_API=1 brew install -s qtkeychain # build from source (with patched qt5 dependency)
    - sh ci/build_macos_PythonQt.sh
  build_script:
    - sh ci/build_macos.sh
  test_script:
    - ../knossos-build/KNOSSOS.app/Contents/MacOS/knossos exit
  artifacts:
    - path: '*nightly.*'
-
  matrix:
    only:
      - image: macOS-ventura
  before_test:
    - curl --fail -JLO https://github.com/knossos-project/knossos/releases/download/nightly-dev/macos.$APPVEYOR_REPO_BRANCH2-KNOSSOS.nightly.app.zip
    - unzip -q macos.$APPVEYOR_REPO_BRANCH2-KNOSSOS.nightly.app.zip
  build: off
  test_script:
    - KNOSSOS.app/Contents/MacOS/knossos exit
  deploy: off
-
  matrix:
    only:
      - image: Visual Studio 2022
  environment:
    MSYSTEM: MINGW64
  build_script:
    - cmd: C:\msys64\usr\bin\bash -lc "pacman -Syuu --noconfirm"
    - cmd: C:\msys64\usr\bin\bash -lc "$(cygpath ${APPVEYOR_BUILD_FOLDER})/ci/build_windows.sh"
  artifacts:
    - path: '*nightly.*'
-
  matrix:
    only:
      - image: Visual Studio 2017
      - image: Visual Studio 2015
  build: off
  before_test:
    - curl --fail -JLO https://github.com/knossos-project/knossos/releases/download/nightly-dev/win.%APPVEYOR_REPO_BRANCH2%-KNOSSOS.nightly.exe
  deploy: off

test_script:
  - cmd: curl --fail -JLO https://github.com/pal1000/mesa-dist-win/releases/download/%MESA_DIST_WIN_VER%/mesa3d-%MESA_DIST_WIN_VER%-release-msvc.7z
  - cmd: 7z e "-i!x64/*.dll" "-i!x64/*.json" "mesa3d-*-release-msvc.7z"
  - cmd: cp -v C:/Python3*-x64/python3*.dll . || true
  - cmd: win.%APPVEYOR_REPO_BRANCH2%-KNOSSOS.nightly.exe exit || true
  # custom screen specification is required for 1604, because the default used to be only 8 bit
  - sh: time xvfb-run -e /dev/stdout --auto-servernum -s '-screen 0 1024x768x24' ./linux.$APPVEYOR_REPO_BRANCH2-KNOSSOS.nightly.AppImage exit

deploy:
  - provider: GitHub
    tag: nightly
    auth_token:
      secure: t9BAyR+k93XD/dXN/gaOgApdGKOxb4lvDtpci8pHHxghvSxd/wNGdFFe/N9WqZSr
    artifact: /.*\.KNOSSOS\..*/
    prerelease: true
    force_update: true
    on:
      branch: master
  - provider: GitHub
    tag: nightly-dev
    auth_token:
      secure: t9BAyR+k93XD/dXN/gaOgApdGKOxb4lvDtpci8pHHxghvSxd/wNGdFFe/N9WqZSr
    artifact: /.*-KNOSSOS\..*/
    prerelease: true
    force_update: true
